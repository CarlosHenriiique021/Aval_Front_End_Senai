<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Horizonte Blue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cabecalho">
        <div class="container-nav">
            <h1 class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">Horizonte Blue</a>
            </h1>
            <div id="menu">
                <a href="index.html">Início</a>
                <a href="destinos.html">Destinos</a>
                <a href="cadastro.html">Cadastro</a>
                <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <div class="secao">
        <h6>Cadastro</h6>
        <form id="formCadastro">
            <label>Nome:</label>
            <input type="text" name="nome" id="nome">

            <label>E-mail:</label>
            <input type="email" name="email" id="email">

            <label>Cep:</label>
            <input type="text" name="cep" id="cep">

            <label>Rua:</label>
            <input type="text" name="rua" id="rua">

            <label>Bairro:</label>
            <input type="text" name="bairro" id="bairro">

            <label>Cidade:</label>
            <input type="text" name="cidade" id="cidade">

            <label>Estado:</label>
            <input type="text" name="estado" id="estado">

            <label>Senha:</label>
            <input type="password" name="senha" id="senha">

            <button type="submit" class="btn-enviar">Enviar Pedido</button>
        </form>
    </div>

    <div id="rodape">
        <p>© 2026 Horizonte Blue - Viagens & Turismo</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
