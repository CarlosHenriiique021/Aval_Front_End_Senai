<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Horizonte Blue</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="pagina-estatica">
    <div id="cabecalho">
        <div class="container-nav">
            <h1 class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">Horizonte Blue</a>
            </h1>
        </div>
    </div>

    <div class="secao-login">
        <form id="formLogin">
            <h2>Login</h2>

            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="admin@horizonte.com" required>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" placeholder="••••••••" required>

            <button type="submit">Entrar</button>

            <p id="mensagemErro" class="erro"></p>
        </form>
    </div>

    <div id="interface"></div>

    <div class="pagina-curta"></div>

    <div id="rodape">
        <p>© 2026 Horizonte Blue - Viagens & Turismo</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
