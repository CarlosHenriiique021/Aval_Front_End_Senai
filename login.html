<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
     <div class="login">
        <h6>Login</h6>
        <form id="sistemaLogin">
            <label>E-mail:</label>
            <input type="email" name="email">

            <label>Senha:</label>
            <input type="senha" name="senha">

            <button type="submit" class="btn-enviar">Entrar</button>
        </form>
    </div>
</body>
</html>
